# ============================================================
# Inflation Forecasting – Experiment Configuration
# Almosova & Andresen (2023) replication
# ============================================================

# ── Data ──────────────────────────────────────────────────────
data:
  type: both              # 'sa' | 'na' | 'both'
  cache_dir: "."          # directory to cache cpi_cache.csv

# ── Device ────────────────────────────────────────────────────
device: auto              # 'auto' | 'cpu' | 'cuda' | 'mps'

# ── Model selection ───────────────────────────────────────────
selection:
  use_self_defined_params: true  # true  → use user_params block below (highest priority)
  use_paper_params: true          # true  → use Tables 3-5 best params (if not self-defined)
                                  # false → run grid search + CV
  quick: false            # true  → small grid for smoke-testing
  skip_if_saved: true     # true  → reload results/best_params_<label>.json if present
  n_cv: 20                # Monte-Carlo CV repetitions
  val_frac: 0.10          # fraction of training set used as validation
  top_frac: 0.10          # top fraction kept after Stage-1 pre-training

# ── User-defined hyperparameters ──────────────────────────────
# Used when selection.use_self_defined_params: true
# infc: null | "aic" | "bic" | "hqic"
user_params:
  ar:
    infc: null
    max_lag: 24
    lr: 0.003
    epochs: 50
  nn:
    n_hidden: 20
    infc: null
    max_lag: 12
    lr: 0.001
    epochs: 50
  lstm:
    n_hidden: 50
    infc: null
    max_lag: 24
    lr: 0.001
    epochs: 100
  transformer:
    n_hidden: 32
    infc: null
    max_lag: 24
    lr: 0.001
    epochs: 100

# ── Forecasting ───────────────────────────────────────────────
forecasting:
  h_max: 12               # maximum forecast horizon (months)
  train_end:  "1989-12"
  test_start: "2000-01"
  test_end:   "2010-06"

# ── LRP analysis ──────────────────────────────────────────────
lrp:
  enabled: false

# ── Sensitivity analysis ──────────────────────────────────────
sensitivity:
  enabled: false
  n_cv: 20                # MC repetitions per hyperparameter value

# ── Results ───────────────────────────────────────────────────
results:
  dir: "results"
  save_figures: true
  save_tables:  true
